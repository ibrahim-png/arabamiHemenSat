<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Aracınızı hızlı ve kolay şekilde satmak için aracınız için ücretsiz bir şekilde teklif başvurusu oluşturun."
    >

    <meta
        name="robots"
        content="index, follow"
    >

    <link
        rel="canonical"
        href="https://arabanihemensat.com/"
    >

    <title>Arabanı Hemen Sat | Araç Satış Başvurusu</title>

    <link
        rel="stylesheet"
        href="/style.css"
    >
</head>

<body>

    <main class="page">

        <section
            class="application-card"
            aria-labelledby="pageTitle"
        >

            <header class="card-header">

                <h1 id="pageTitle">
                    Aracınızın Bilgileri
                </h1>

                <p>
                    Araç bilgilerinizi girerek tamamen ücretsiz bir şekilde
                    Teklif alabilirsiniz. 
                </p>

            </header>

            <form
                id="basvuruForm"
                novalidate
            >

                <div class="form-group">

                    <label for="telefonno">
                        Telefon numarası
                    </label>

                    <input
                        id="telefonno"
                        name="telefonno"
                        type="tel"
                        inputmode="numeric"
                        autocomplete="tel"
                        maxlength="11"
                        placeholder="05XXXXXXXXX"
                        required
                    >

                    <div
                        id="telefonnoError"
                        class="error-message"
                        role="alert"
                    ></div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label for="marka">
                            Araç markası
                        </label>

                        <select
                            id="marka"
                            name="marka"
                            disabled
                            required
                        >
                            <option value="">
                                Markalar yükleniyor...
                            </option>
                        </select>

                        <div
                            id="markaError"
                            class="error-message"
                            role="alert"
                        ></div>

                    </div>

                    <div class="form-group">

                        <label for="tip">
                            Araç tipi / modeli
                        </label>

                        <select
                            id="tip"
                            name="tip"
                            disabled
                            required
                        >
                            <option value="">
                                Önce marka seçiniz
                            </option>
                        </select>

                        <div
                            id="tipError"
                            class="error-message"
                            role="alert"
                        ></div>

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label for="yil">
                            Model yılı
                        </label>

                        <input
                            id="yil"
                            name="yil"
                            type="number"
                            inputmode="numeric"
                            min="1900"
                            placeholder="Örnek: 2022"
                            required
                        >

                        <div
                            id="yilError"
                            class="error-message"
                            role="alert"
                        ></div>

                    </div>

                    <div class="form-group">

                        <label for="km">
                            Kilometre
                        </label>

                        <input
                            id="km"
                            name="km"
                            type="number"
                            inputmode="numeric"
                            min="0"
                            max="5000000"
                            placeholder="Örnek: 75000"
                            required
                        >

                        <div
                            id="kmError"
                            class="error-message"
                            role="alert"
                        ></div>

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label for="vites">
                            Vites
                        </label>

                        <select
                            id="vites"
                            name="vites"
                            disabled
                            required
                        >
                            <option value="">
                                Yükleniyor...
                            </option>
                        </select>

                        <div
                            id="vitesError"
                            class="error-message"
                            role="alert"
                        ></div>

                    </div>

                    <div class="form-group">

                        <label for="yakit">
                            Yakıt
                        </label>

                        <select
                            id="yakit"
                            name="yakit"
                            disabled
                            required
                        >
                            <option value="">
                                Yükleniyor...
                            </option>
                        </select>

                        <div
                            id="yakitError"
                            class="error-message"
                            role="alert"
                        ></div>

                    </div>

                </div>

                <div class="form-group">

                    <label for="il">
                        Bulunduğunuz il
                    </label>

                    <select
                        id="il"
                        name="il"
                        disabled
                        required
                    >
                        <option value="">
                            İller yükleniyor...
                        </option>
                    </select>

                    <div
                        id="ilError"
                        class="error-message"
                        role="alert"
                    ></div>

                </div>

                <button
                    id="submitButton"
                    class="submit-button"
                    type="submit"
                >
                    Ücretsiz Teklif Al
                </button>

                <div
                    id="formMessage"
                    class="form-message hidden"
                    role="status"
                    aria-live="polite"
                ></div>

            </form>

        </section>

    </main>

    <script src="/script.js"></script>

</body>
</html>
